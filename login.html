<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Espejos Heladería - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="images/logo.png" alt="Los Espejos Heladería" class="logo">
            <p class="header-title">No es solo un Helado, es tradición hecha sabor</p>
        </header>

        <section class="content-section">
            <h2 class="login-title">Iniciar Sesión</h2>

            <div class="login-form">
                <div class="info-field">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" placeholder="correo@ejemplo.com">
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="info-field">
                    <label for="login-password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Mínimo 6 caracteres">
                        <button type="button" id="toggle-password" class="toggle-password-btn">👁</button>
                    </div>
                    <span class="error-message" id="password-error"></span>
                </div>

                <button id="login-btn" class="login-btn">Iniciar Sesión</button>
            </div>
        </section>
    </div>
    <script type="module" src="js/login.js"></script>
</body>

</html>
