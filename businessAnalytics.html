<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cómo Hacerlo</title>
    <link rel="stylesheet" href="css/howToDoIt.css">
</head>
<body>

    <div class="analytics-container">

    <h1 class="analytics-title">📊 Analíticas</h1>

    <div class="filters-container">

    <div class="filter">
        <label>Fecha</label>
        <select id="date-filter">
            <option value="">Cargando...</option>
        </select>
    </div>

    <div class="filter">
        <label>Método de pago</label>
        <select id="payment-filter">
            <option value="">Todos</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia</option>
        </select>
    </div>

</div>

    <div class="cards-container">
        <div class="card">
            <h3>Pedidos hoy</h3>
            <p id="orders-today">0</p>
        </div>

        <div class="card">
            <h3>Ventas hoy</h3>
            <p id="sales-today">$0</p>
        </div>

        <div class="card">
            <h3>Ticket promedio</h3>
            <p id="avg-ticket">$0</p>
        </div>
    </div>

    <div class="table-container">
        <h2>Resumen por fecha</h2>
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Pedidos</th>
                    <th>Total ventas</th>
                </tr>
            </thead>
            <tbody id="analytics-table"></tbody>
        </table>
    </div>

</div>

</body>
</html>
